name: release

# 触发方式（二选一）:
#   1) 手动: Actions 页 -> release -> Run workflow（可填版本号，如 0.3.0）
#   2) 打 tag: git tag v0.3.0 && git push origin v0.3.0  -> 自动发版
on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (如 0.3.0，不带 v)"
        required: true
        default: "0.3.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write   # 创建 Release / 上传产物需要

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 解析版本号：tag 触发取 tag 去掉前导 v；手动触发取 inputs.version
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"        # v0.3.0
            VER="${TAG#v}"                         # 0.3.0
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            VER="${{ github.event.inputs.version }}"
            echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "版本: $VER"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install tauri-cli
        shell: bash
        run: cargo install tauri-cli --version "^2.1" --locked

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync version into tauri.conf.json
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          ver = os.environ["VER"]
          p = "src-tauri/tauri.conf.json"
          c = json.load(open(p, encoding="utf-8"))
          c["version"] = ver
          json.dump(c, open(p, "w", encoding="utf-8"), indent=2, ensure_ascii=False)
          print("tauri.conf.json version ->", ver)
          PY
        env:
          VER: ${{ steps.ver.outputs.version }}

      - name: Run tests
        shell: bash
        run: python run_tests.py

      - name: Build GUI (.msi / .exe)
        shell: cmd
        run: scripts\build-gui.bat

      - name: Upload artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: StocksSaveEditor-${{ steps.ver.outputs.version }}-windows-x64
          path: |
            build/bundle-release/sse-gui.exe
            build/bundle-release/bundle/msi/*.msi
            build/bundle-release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          body: |
            ## 下载说明
            - **普通用户**：下载 `*-setup.exe`（NSIS 安装包）或 `.msi`，双击安装后从开始菜单运行。
            - ⚠️ 不要直接下载 `sse-gui.exe`——那是裸可执行文件，缺少同目录的嵌入 Python 与前端资源，单独运行会崩溃。
          files: |
            build/bundle-release/bundle/msi/*.msi
            build/bundle-release/bundle/nsis/*.exe
