name: test

on:
  push:
    branches: [main, dev, dev-refactor]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        shell: bash
        run: |
          python run_tests.py
